name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify files
        run: |
          test -f index.html
          test -f app.js

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Validate HTML
        run: grep "<html" index.html

      - name: Validate JS
        run: grep "function" app.js

  package:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Create build folder
        run: |
          mkdir build
          cp index.html build/
          cp app.js build/
          cp style.css build/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-app
          path: build/

    deploy:
    needs: package

    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages

    steps:

      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4